on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-publish:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [ "BaseDadesRelacionalsLib" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build with Gradle
        run: |
          cd ${{ matrix.project }}
          chmod +x gradlew
          ./gradlew assemble

      - name: Run Tests
        run: |
          cd ${{ matrix.project }}
          ./gradlew check

      - name: Generate Javadoc
        run: |
          cd ${{ matrix.project }}
          ./gradlew javadoc

      - name: Publish Artifacts
        if: github.ref == 'refs/heads/master'
        run: |
          cd ${{ matrix.project }}
          ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}